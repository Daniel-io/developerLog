<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeveloperLog</title>
  </head>
  <body>
    <div id="app"></div>
    <p>TESTING</p>

    <form class="flashcard flashcard--editor" id="form">
      <fieldset class="flashcard__fieldset">
        <legend>Flashcard</legend>

        <div class="flashcard__field">
          <label
            class="flashcard__label flashcard__label--question"
            for="question"
          >
            Question
          </label>
          <input type="text" id="question" name="question" required>
        </div>

        <div class="flashcard__field">
          <label
            class="flashcard__label flashcard__label--answer"
            for="answer"
          >
            Answer
          </label>
          <textarea id="answer" name="answer" required></textarea>
        </div>
      </fieldset>

      <button type="submit">Save</button>
    </form>

  </body>
</html>
